services:
  db:
    image: postgres:18.3
    container_name: barcodes_pg
    restart: always
    shm_size: 128mb

    ports:
      - "${POSTGRES_PORT}:5432"

    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
    volumes:
      - ./db/postgres_data:/var/lib/postgresql